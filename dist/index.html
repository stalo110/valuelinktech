<html lang="en">

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Valuelink Technologies delivers end-to-end IT solutions that empower businesses through innovation, trust, and technical expertise."
    />
    <meta name="theme-color" content="#fcf8f4" />
    <script>
      (() => {
        const storedTheme = localStorage.getItem('valuelink-theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = storedTheme || (systemPrefersDark ? 'dark' : 'light');

        document.documentElement.classList.toggle('dark', theme === 'dark');
        document.documentElement.dataset.theme = theme;
      })();
    </script>
